<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>OpenSpiRobs — MuJoCo Simulator</title>
    <style>
      /* ── Base ── */
      :root {
        --bg: #0e0e16;
        --panel: rgba(20, 20, 32, 0.72);
        --border: rgba(255,255,255,0.06);
        --accent: #5090ff;
        --accent-dim: rgba(80,144,255,0.25);
        --text: rgba(255,255,255,0.88);
        --text2: rgba(255,255,255,0.48);
        --surf: rgba(255,255,255,0.05);
        --surf-h: rgba(255,255,255,0.09);
        --r: 10px;
        --rs: 6px;
      }
      * { margin:0; padding:0; box-sizing:border-box; }
      html,body { width:100%; height:100%; overflow:hidden;
        font-family: -apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;
        background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

      /* ── Layout ── */
      #app { width:100%; height:100%; display:flex; }
      #viewport { flex:1; position:relative; }
      #viewport canvas { width:100%; height:100%; display:block; }
      #right-panel {
        width:272px; min-width:230px; overflow-y:auto;
        background: var(--panel); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
        border-left:1px solid var(--border); padding:6px 0;
      }
      #right-panel::-webkit-scrollbar { width:5px; }
      #right-panel::-webkit-scrollbar-track { background:transparent; }
      #right-panel::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.10); border-radius:3px; }

      /* ── lil-gui overrides ── */
      .lil-gui {
        --background-color: transparent;
        --text-color: var(--text);
        --title-background-color: var(--surf);
        --title-text-color: var(--text);
        --widget-color: rgba(255,255,255,0.06);
        --hover-color: var(--surf-h);
        --focus-color: rgba(80,144,255,0.35);
        --number-color: var(--accent);
        --string-color: #8ac4ff;
        --font-family: -apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;
        --font-size: 11px;
        --input-font-size: 11px;
        --font-family-mono: 'SF Mono','Fira Code',monospace;
        --widget-height: 24px;
        --title-height: 30px;
        --padding: 6px;
        --spacing: 2px;
        --widget-border-radius: 6px;
        --folder-indent: 8px;
        --name-width: 42%;
        --scrollbar-width: 0px;
        border: none !important;
      }
      .lil-gui.root {
        margin: 0; width: 100% !important;
      }
      .lil-gui.root > .title {
        font-size: 12px; font-weight: 600; letter-spacing: 0.03em;
        text-transform: uppercase; color: var(--text2);
        padding-left: 12px;
      }
      .lil-gui .title {
        border-radius: var(--rs); margin: 1px 4px;
        font-weight: 500; font-size: 11px;
        transition: background 0.12s;
      }
      .lil-gui .children { margin-left: 2px; }
      .lil-gui .controller { margin: 0 4px; border-radius: var(--rs); }
      .lil-gui .controller .name { font-size: 10.5px; color: var(--text2); }

      /* buttons */
      .lil-gui .controller.function .widget button {
        border-radius: var(--rs);
        background: var(--surf);
        border: 1px solid rgba(255,255,255,0.07);
        color: var(--text);
        font-weight: 500; font-size: 11px;
        transition: all 0.12s;
        cursor: pointer;
      }
      .lil-gui .controller.function .widget button:hover {
        background: var(--surf-h);
        border-color: rgba(255,255,255,0.14);
      }
      /* primary action buttons */
      .lil-gui .controller.function.primary .widget button {
        background: var(--accent-dim);
        border-color: rgba(80,144,255,0.3);
        color: #fff;
      }
      .lil-gui .controller.function.primary .widget button:hover {
        background: rgba(80,144,255,0.35);
      }

      /* inputs */
      .lil-gui input[type="number"],
      .lil-gui input[type="text"] {
        border-radius: 4px; border: 1px solid rgba(255,255,255,0.05);
        transition: border-color 0.12s;
      }
      .lil-gui input:focus { border-color: var(--accent) !important; }
      .lil-gui input[type="checkbox"] { border-radius: 4px; }

      /* slider */
      .lil-gui .controller .slider { border-radius: 3px; }
      .lil-gui .controller .slider .fill {
        border-right: 2px solid var(--accent);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="viewport">
        <canvas id="sim-canvas"></canvas>
      </div>
      <div id="right-panel"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
